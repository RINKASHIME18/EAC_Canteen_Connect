{% extends 'canteen/base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'canteen/css/home.css' %}">
{% endblock %}

{% block content %}
    <div class="dashboard-wrap">
        <h1 class="dashboard-title">Dashboard</h1>
        <hr class="dashboard-divider">

        <div class="status-card">
            <div class="status-icon">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.8V21h12v-7.2"></path><path d="M6 13h12a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3l-2-.5L14 3h-4L8 5.5 6 6a3 3 0 0 0-3 3v1a3 3 0 0 0 3 3Z"></path><path d="M9 13v3"></path><path d="M15 13v3"></path></svg>
            </div>
            <div class="status-content">
                <h2>Canteen Status: <span class="status-highlight">Moderate Line</span></h2>
                <p>Month/Year:<br><strong>February, 2026</strong></p>
            </div>
        </div>

        <div class="action-grid">
            <a href="{% url 'report_concern' %}" class="action-card">
                <div class="card-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8 a3 3 0 1 1-5.8-1.6"></path></svg>
                </div>
                <h3>Report a Concern</h3>
            </a>

            <a href="{% url 'rate_view' %}" class="action-card">
                <div class="card-icon star-group">
                    <span class="star-filled">★</span><span class="star-filled">★</span><span class="star-filled">★</span><span class="star-empty">☆</span><span class="star-empty">☆</span>
                </div>
                <h3>Ratings</h3>
            </a>

            <a href="{% url 'suggestion_view' %}" class="action-card">
                <div class="card-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .5 2.2 1.5 3.1.7.9 1.2 1.7 1.5 2.5h6Z"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
                </div>
                <h3>Suggestions Box</h3>
            </a>
        </div>

    </div>
{% endblock %}
